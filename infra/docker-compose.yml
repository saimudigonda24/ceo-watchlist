services:
  db:
    image: timescale/timescaledb:2.15.2-pg15
    container_name: ceo_db
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=ceo
      - POSTGRES_PASSWORD=ceo
      - POSTGRES_DB=ceo
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceo -d ceo"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../
      dockerfile: ./api/Dockerfile
    container_name: ceo_api
    env_file:
      - ../api/.env.example
    depends_on:
      db:
        condition: service_healthy
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../api:/app
      - ../data:/data

volumes:
  dbdata:   # <-- this matches the db service’s named volume above